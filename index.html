<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>遷移テスト</title>
<style>
  .screen{display:none;padding:40px}
  .screen.active{display:block}
  nav button{padding:10px 20px;margin:4px;cursor:pointer}
  nav button.active{background:#4a6fa5;color:#fff;border:none;border-radius:8px}
</style>
</head>
<body>
<nav>
  <button class="active" data-screen="home" onclick="go('home')">ホーム</button>
  <button data-screen="list" onclick="go('list')">リスト</button>
  <button data-screen="calendar" onclick="go('calendar')">カレンダー</button>
</nav>
<div class="screen active" id="homeScreen"><h1>🏠 ホーム</h1></div>
<div class="screen" id="listScreen"><h1>📝 リスト</h1></div>
<div class="screen" id="calendarScreen"><h1>📅 カレンダー</h1></div>
<script>
function go(s){
  document.querySelectorAll('.screen').forEach(el=>el.classList.remove('active'));
  document.getElementById(s+'Screen').classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.screen===s));
}
</script>
</body>
</html>
